<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 배틀 - Math Battle Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            width: 100%;
            height: 100vh;
            max-width: 480px;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        /* Loading Screen */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Login Screen */
        #loginScreen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
        }

        .logo {
            font-size: 80px;
            margin-bottom: 30px;
        }

        .title {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 40px;
        }

        .google-login-btn {
            background: #4285F4;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 300px;
            transition: all 0.3s;
        }

        .google-login-btn:hover {
            background: #3367D6;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 133, 244, 0.4);
        }

        .google-logo {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #4285F4;
            font-size: 12px;
        }

        /* Home Screen */
        #homeScreen {
            display: none;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            justify-content: center;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-size: 18px;
            font-weight: bold;
        }

        .user-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.9;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px;
            border-radius: 8px;
        }

        .admin-link {
            background: #FF9800;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .admin-link:hover {
            background: #F57C00;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            margin-top: 20px;
        }

        .game-modes {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .game-mode-btn {
            background: white;
            border: 2px solid #E0E0E0;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .game-mode-btn:active {
            background: #F5F5F5;
            border-color: #667eea;
        }

        .mode-icon {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .mode-name {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }

        .mode-desc {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .ranking-container {
            background: #F5F5F5;
            border-radius: 12px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            gap: 10px;
        }

        .rank-badge {
            width: 32px;
            height: 32px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            flex-shrink: 0;
        }

        .rank-badge.top {
            background: #FFD700;
            color: #333;
        }

        .rank-info {
            flex: 1;
        }

        .rank-name {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .rank-points {
            font-size: 12px;
            color: #999;
        }

        .logout-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #FF5252;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #FF1744;
            transform: translateY(-2px);
        }

        /* Room Screen */
        #roomScreen {
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .back-btn {
            background: #E0E0E0;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .room-code-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .room-input, .join-input {
            padding: 12px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }

        .room-input:focus, .join-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .primary-btn, .secondary-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .primary-btn {
            background: #667eea;
            color: white;
        }

        .primary-btn:active {
            background: #5568d3;
            transform: scale(0.98);
        }

        .secondary-btn {
            background: #E0E0E0;
            color: #333;
        }

        .secondary-btn:active {
            background: #D0D0D0;
        }

        .character-select {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .character-btn {
            aspect-ratio: 1;
            border: 2px solid #E0E0E0;
            background: white;
            border-radius: 8px;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .character-btn.selected {
            border-color: #667eea;
            background: #F0F0FF;
            transform: scale(1.1);
        }

        .character-btn:active {
            transform: scale(0.95);
        }

        .waiting-room {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .waiting-title {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .room-code-display {
            font-size: 48px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 8px;
            background: #F5F5F5;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            text-align: center;
        }

        .waiting-spinner {
            font-size: 40px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .player-ready {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin: 20px 0;
        }

        .player-card {
            background: #F5F5F5;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .player-character {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .player-name {
            font-weight: bold;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .ready-status {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            background: #FFE0B2;
            color: #F57C00;
        }

        .ready-status.ready {
            background: #C8E6C9;
            color: #2E7D32;
        }

        .countdown {
            font-size: 48px;
            font-weight: bold;
            color: #FF5252;
            text-align: center;
        }

        /* Game Screen */
        #gameScreen {
            display: none;
            flex-direction: column;
            padding: 10px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #F5F5F5;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .game-timer {
            font-weight: bold;
            color: #FF5252;
            font-size: 14px;
        }

        .game-modes-display {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .player-status {
            flex: 1;
            background: white;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-size: 12px;
        }

        .player-status.current {
            border-color: #667eea;
            background: #F0F0FF;
        }

        .player-character-game {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .player-name-game {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .player-score {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .player-hp {
            background: #FF5252;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .question-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
            background: white;
            border-radius: 12px;
            padding: 20px;
        }

        .question {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            text-align: center;
        }

        .difficulty-badge {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            background: #E3F2FD;
            color: #1976D2;
            font-weight: bold;
        }

        .answer-choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .choice-btn {
            padding: 15px;
            border: 2px solid #E0E0E0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .choice-btn:active {
            transform: scale(0.95);
        }

        .choice-btn.correct {
            background: #C8E6C9;
            border-color: #2E7D32;
            color: #1B5E20;
        }

        .choice-btn.incorrect {
            background: #FFCDD2;
            border-color: #C62828;
            color: #B71C1C;
        }

        .game-controls {
            display: flex;
            gap: 10px;
            padding: 10px;
        }

        .surrender-btn {
            flex: 1;
            background: #FF5252;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .surrender-btn:active {
            background: #FF1744;
        }

        /* Game Over Screen */
        #gameOverScreen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            overflow-y: auto;
        }

        .result-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .result-stats {
            background: #F5F5F5;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            width: 100%;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #E0E0E0;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #999;
        }

        .stat-value {
            font-weight: bold;
            color: #333;
        }

        .points-earned {
            font-size: 24px;
            color: #4CAF50;
            font-weight: bold;
            margin: 20px 0;
        }

        .play-again-btn, .home-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .play-again-btn {
            background: #667eea;
            color: white;
        }

        .play-again-btn:active {
            background: #5568d3;
        }

        .home-btn {
            background: #E0E0E0;
            color: #333;
        }

        .home-btn:active {
            background: #D0D0D0;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px 20px;
            border-radius: 12px;
            text-align: center;
            max-width: 300px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .modal-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .modal-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .modal-confirm {
            background: #FF5252;
            color: white;
        }

        .modal-confirm:active {
            background: #FF1744;
        }

        .modal-cancel {
            background: #E0E0E0;
            color: #333;
        }

        .modal-cancel:active {
            background: #D0D0D0;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
                box-shadow: none;
            }

            .question {
                font-size: 28px;
            }

            .character-select {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .hidden {
            display: none !important;
        }

        .audio-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #667eea;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 100;
        }

        .audio-toggle:active {
            background: #5568d3;
            transform: scale(0.9);
        }

        .audio-toggle.muted {
            background: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Loading Screen -->
        <div id="loadingScreen">
            <div class="spinner"></div>
            <p>로딩 중...</p>
        </div>

        <!-- Login Screen -->
        <div id="loginScreen">
            <div class="logo">🎮</div>
            <div class="title">수학 배틀</div>
            <div class="subtitle">친구와 함께 수학 문제를 풀어보세요!</div>
            <button class="google-login-btn" id="googleLoginBtn">
                <div class="google-logo">G</div>
                Google로 로그인
            </button>
        </div>

        <!-- Home Screen -->
        <div id="homeScreen">
            <div class="header">
                <div class="user-info">
                    <img id="userAvatar" class="user-avatar" src="" alt="프로필">
                    <div class="user-name" id="userName">사용자</div>
                </div>
                <div class="user-stats">
                    <div class="stat-item">포인트: <span id="userPoints">0</span></div>
                    <div class="stat-item">게임: <span id="userGames">0</span>/<span id="userWins">0</span></div>
                </div>
                <a href="admin.html" id="adminLink" class="admin-link hidden">🔧 관리자 패널</a>
            </div>

            <div class="main-content">
                <div class="section-title">게임 모드 선택</div>
                <div class="game-modes">
                    <button class="game-mode-btn" data-mode="speed">
                        <div class="mode-icon">⚡</div>
                        <div class="mode-name">스피드 모드</div>
                        <div class="mode-desc">30초 안에 가장 많이 풀기</div>
                    </button>
                    <button class="game-mode-btn" data-mode="survival">
                        <div class="mode-icon">🛡️</div>
                        <div class="mode-name">서바이벌 모드</div>
                        <div class="mode-desc">상대방 체력을 모두 없애기</div>
                    </button>
                    <button class="game-mode-btn" data-mode="boss">
                        <div class="mode-icon">🐉</div>
                        <div class="mode-name">보스 모드</div>
                        <div class="mode-desc">친구와 함께 보스를 물리치기</div>
                    </button>
                </div>

                <div class="section-title">🏆 순위</div>
                <div class="ranking-container" id="rankingContainer">
                    <div style="text-align: center; padding: 20px; color: #999;">로딩 중...</div>
                </div>
            </div>

            <button class="logout-btn" id="logoutBtn">로그아웃</button>
        </div>

        <!-- Room Screen -->
        <div id="roomScreen">
            <button class="back-btn" id="backBtn">← 돌아가기</button>

            <div id="roomSetup">
                <div class="section-title" style="margin-top: 0;">게임 모드 선택</div>
                <div id="modeDisplay" style="background: #F5F5F5; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 32px; margin-bottom: 10px;" id="modeIconDisplay"></div>
                    <div style="font-size: 16px; font-weight: bold; color: #333;" id="modeNameDisplay"></div>
                </div>

                <div class="section-title">캐릭터 선택</div>
                <div class="character-select" id="characterSelect"></div>

                <div class="section-title">방 코드</div>
                <div class="room-code-input">
                    <div class="input-group">
                        <label class="input-label">새 방 만들기</label>
                        <input type="text" class="room-input" id="newRoomCode" placeholder="자동 생성됨" readonly>
                    </div>
                    <div class="input-group">
                        <label class="input-label">방 입장</label>
                        <input type="text" class="join-input" id="joinRoomCode" placeholder="코드 입력" maxlength="4">
                    </div>
                </div>

                <div class="button-group">
                    <button class="primary-btn" id="createRoomBtn">방 만들기</button>
                    <button class="primary-btn" id="joinRoomBtn">입장하기</button>
                </div>
            </div>

            <div class="waiting-room" id="waitingRoom">

        // Sound Effects using Web Audio API
        class SoundEffects {
            constructor() {
                this.audioContext = null;
                this.enabled = true;
            }

            init() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            playCorrect() {
                if (!this.enabled || !this.audioContext) return;
                this.playTone([523, 659, 784], 0.1);
            }

            playIncorrect() {
                if (!this.enabled || !this.audioContext) return;
                this.playTone([392, 349, 330], 0.15);
            }

            playCountdown() {
                if (!this.enabled || !this.audioContext) return;
                this.playTone([800], 0.05);
            }

            playWin() {
                if (!this.enabled || !this.audioContext) return;
                this.playTone([523, 659, 784, 1047], 0.08);
            }

            playLose() {
                if (!this.enabled || !this.audioContext) return;
                this.playTone([392, 349, 330, 294], 0.12);
            }

            playTone(frequencies, duration) {
                try {
                    const now = this.audioContext.currentTime;
                    let delay = 0;

                    frequencies.forEach(freq => {
                        const osc = this.audioContext.createOscillator();
                        const gain = this.audioContext.createGain();

                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.3, now + delay);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + delay + duration);

                        osc.connect(gain);
                        gain.connect(this.audioContext.destination);

                        osc.start(now + delay);
                        osc.stop(now + delay + duration);

                        delay += duration / 2;
                    });
                } catch (e) {
                    console.log('Sound effect error:', e);
                }
            }

            toggle() {
                this.enabled = !this.enabled;
                document.getElementById('audioToggle').textContent = this.enabled ? '🔊' : '🔇';
            }
        }

        function generateQuestions(difficulty = 'easy') {
            const levels = {
                easy: { maxNum: 20, operations: ['+', '-'] },
                medium: { maxNum: 50, operations: ['+', '-', '×'] },
                hard: { maxNum: 100, operations: ['+', '-', '×', '÷'] }
            };

            const level = levels[difficulty];
            const num1 = Math.floor(Math.random() * level.maxNum) + 1;
            const num2 = Math.floor(Math.random() * level.maxNum) + 1;
            const operation = level.operations[Math.floor(Math.random() * level.operations.length)];

            let answer;
            let questionText;

            switch (operation) {
                case '+':
                    answer = num1 + num2;
                    questionText = `${num1} + ${num2}`;
                    break;
                case '-':
                    answer = Math.abs(num1 - num2);
                    questionText = `${Math.max(num1, num2)} - ${Math.min(num1, num2)}`;
                    break;
                case '×':
                    answer = num1 * num2;
                    questionText = `${num1} × ${num2}`;
                    break;
                case '÷':
                    const divisor = num1;
                    const quotient = Math.floor(Math.random() * 10) + 1;
                    answer = quotient;
                    questionText = `${divisor * quotient} ÷ ${divisor}`;
                    break;
            }

            const wrongAnswers = new Set();
            while (wrongAnswers.size < 3) {
                const wrong = Math.floor(Math.random() * 200) + 1;
                if (wrong !== answer) wrongAnswers.add(wrong);
            }

            const choices = [answer, ...Array.from(wrongAnswers)].sort(() => Math.random() - 0.5);

            return {
                question: questionText,
                answer: answer,
                choices: choices,
                difficulty: difficulty
            };
        }

        function generateNextQuestion() {
            const questionsPerDifficulty = {
                easy: 3,
                medium: 3,
                hard: 3
            };

            if (gameState.correct > 0 && gameState.correct % (questionsPerDifficulty.easy + questionsPerDifficulty.medium) === 0) {
                gameState.difficulty = 'hard';
            } else if (gameState.correct > 0 && gameState.correct % questionsPerDifficulty.easy === 0) {
                gameState.difficulty = 'medium';
            } else {
                gameState.difficulty = 'easy';
            }

            gameState.currentQuestion = generateQuestions(gameState.difficulty);

            document.getElementById('questionDisplay').textContent = gameState.currentQuestion.question;
            document.getElementById('difficultyBadge').textContent = {
                'easy': '쉬움',
                'medium': '중간',

                btn.className = 'choice-btn';
                btn.textContent = choice;
                btn.onclick = () => handleAnswer(choice, btn);
                choicesContainer.appendChild(btn);

            startQuestionTimer();

                if (timeLeft === 0) {
                    clearInterval(questionTimer);
                    handleTimeOut();
                }
            }, 1000);

        function handleAnswer(choice, buttonEl) {
            clearInterval(questionTimer);

            if (choice === gameState.currentQuestion.answer) {
                gameState.correct++;
                gameState.score.player1++;
                buttonEl.classList.add('correct');
                soundEffects.playCorrect();

                setTimeout(() => {
                    generateNextQuestion();

                soundEffects.playIncorrect();

                document.querySelectorAll('.choice-btn').forEach(btn => {
                    btn.disabled = true;
                });

                setTimeout(() => {
                    document.querySelectorAll('.choice-btn').forEach(btn => {
                        btn.disabled = false;
                    });
                    generateNextQuestion();
                }, 1000);
            }
        }

        function handleTimeOut() {
            gameState.incorrect++;
            soundEffects.playIncorrect();
            generateNextQuestion();
        }

                    clearInterval(questionTimer);
                    endGame(gameState.score.player1 > gameState.score.player2);

        function startBossMode() {
            // Boss mode cooperative logic
        }

        function endGame(won) {
            clearInterval(questionTimer);
            const playTime = Math.floor((Date.now() - gameState.gameStartTime) / 1000);
            const pointsEarned = Math.floor((gameState.correct / (gameState.correct + gameState.incorrect)) * 100 * (gameState.difficulty === 'hard' ? 2 : 1));

            updateUserStats(won, pointsEarned);

            document.getElementById('resultIcon').textContent = won ? '🏆' : '😢';
            document.getElementById('resultTitle').textContent = won ? '승리!' : '패배!';
            document.getElementById('correctAnswers').textContent = gameState.correct;
            document.getElementById('incorrectAnswers').textContent = gameState.incorrect;
            document.getElementById('accuracy').textContent = Math.round((gameState.correct / (gameState.correct + gameState.incorrect)) * 100) + '%';
            document.getElementById('playTime').textContent = playTime + '초';
            document.getElementById('pointsEarned').textContent = (won ? '+' : '-') + pointsEarned + ' 포인트';

            if (won) {
                soundEffects.playWin();
            } else {
                soundEffects.playLose();
            }

            showScreen('gameOverScreen');
        }

        // Event Listeners
        document.getElementById('googleLoginBtn').addEventListener('click', loginWithGoogle);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('audioToggle').addEventListener('click', () => soundEffects.toggle());

        document.getElementById('backBtn').addEventListener('click', () => showHomeScreen());

        document.querySelectorAll('.game-mode-btn').forEach(btn => {
            btn.addEventListener('click', () => setupRoom(btn.dataset.mode));
        });

        document.getElementById('createRoomBtn').addEventListener('click', createRoom);
        document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);

        document.getElementById('cancelRoomBtn').addEventListener('click', () => {
            document.getElementById('roomSetup').style.display = 'flex';
            document.getElementById('waitingRoom').style.display = 'none';
        });

        document.getElementById('surrenderBtn').addEventListener('click', () => {
            document.getElementById('surrenderModal').classList.add('active');
        });

        document.getElementById('confirmSurrenderBtn').addEventListener('click', () => {
            document.getElementById('surrenderModal').classList.remove('active');
            gameState.surrendered = true;
            sendPeerMessage({ type: 'surrender' });
            endGame(false);
        });

        document.getElementById('cancelSurrenderBtn').addEventListener('click', () => {
            document.getElementById('surrenderModal').classList.remove('active');
        });

        document.getElementById('playAgainBtn').addEventListener('click', () => {
            setupRoom(currentGameMode);
        });

        document.getElementById('homeBtn').addEventListener('click', showHomeScreen);

        // Initialize
        function initialize() {
            soundEffects.init();
            initPeerConnection();

            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    showHomeScreen();
                } else {
                    showScreen('loginScreen');
                }
                document.getElementById('loadingScreen').style.display = 'none';
            });
        }

        initialize();
    </script>
</body>
</html>
